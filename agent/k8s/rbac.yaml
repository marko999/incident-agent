apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-agent
  namespace: demo-app
  annotations:
    azure.workload.identity/client-id: "YOUR_WORKLOAD_IDENTITY_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: incident-agent
rules:
  # Read access to investigate incidents
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events", "configmaps", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Describe requires get on most resources
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Read monitoring resources
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules", "alertmanagers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: incident-agent
subjects:
  - kind: ServiceAccount
    name: incident-agent
    namespace: demo-app
roleRef:
  kind: ClusterRole
  name: incident-agent
  apiGroup: rbac.authorization.k8s.io
