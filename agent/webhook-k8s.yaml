apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-webhook
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-webhook
  template:
    metadata:
      labels:
        app: agent-webhook
    spec:
      containers:
        - name: webhook
          image: node:20-alpine
          command: ["node", "/app/webhook-server.js"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: app
          configMap:
            name: agent-webhook-code
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-webhook-code
  namespace: demo-app
data:
  webhook-server.js: |
    const http = require('http');
    const PORT = 8080;
    const alerts = [];
    const server = http.createServer((req, res) => {
      if (req.method === 'POST' && req.url === '/alert') {
        let body = '';
        req.on('data', chunk => body += chunk);
        req.on('end', () => {
          try {
            const payload = JSON.parse(body);
            const timestamp = new Date().toISOString();
            for (const alert of payload.alerts || []) {
              const entry = {
                timestamp,
                status: alert.status,
                alertname: alert.labels?.alertname,
                severity: alert.labels?.severity,
                namespace: alert.labels?.namespace,
                pod: alert.labels?.pod,
                summary: alert.annotations?.summary,
                description: alert.annotations?.description,
              };
              alerts.push(entry);
              console.log(`[ALERT] ${entry.status} | ${entry.alertname} | ${entry.summary}`);
            }
            res.writeHead(200, { 'Content-Type': 'application/json' });
            res.end(JSON.stringify({ status: 'received' }));
          } catch (e) {
            res.writeHead(400);
            res.end('Bad request');
          }
        });
      } else if (req.method === 'GET' && req.url === '/alerts') {
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ alerts, count: alerts.length }));
      } else if (req.method === 'GET' && req.url === '/health') {
        res.writeHead(200);
        res.end('ok');
      } else {
        res.writeHead(404);
        res.end('Not found');
      }
    });
    server.listen(PORT, () => console.log(`Webhook receiver on port ${PORT}`));
---
apiVersion: v1
kind: Service
metadata:
  name: agent-webhook
  namespace: demo-app
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: agent-webhook
