apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: demo-app.rules
      rules:
        # High CPU usage
        - alert: HighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="demo-app", container="demo-app"}[2m]) > 0.5
          for: 30s
          labels:
            severity: warning
            service: demo-app
          annotations:
            summary: "High CPU usage detected"
            description: "Container {{ $labels.pod }} CPU usage is {{ $value | humanizePercentage }} for more than 30s"

        # High memory usage
        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="demo-app", container="demo-app"} > 200e6
          for: 30s
          labels:
            severity: warning
            service: demo-app
          annotations:
            summary: "High memory usage detected"
            description: "Container {{ $labels.pod }} memory usage is {{ $value | humanize1024 }}"

        # High error rate (>10% of requests are 5xx)
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="demo-app", status=~"5.."}[1m]))
            /
            sum(rate(http_requests_total{namespace="demo-app"}[1m]))
            > 0.1
          for: 30s
          labels:
            severity: critical
            service: demo-app
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }}"

        # High latency (p95 > 2s)
        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="demo-app"}[1m])) by (le))
            > 2
          for: 30s
          labels:
            severity: warning
            service: demo-app
          annotations:
            summary: "High latency detected"
            description: "p95 latency is {{ $value }}s"

        # Pod restarts
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="demo-app"}[5m]) > 2
          for: 0s
          labels:
            severity: critical
            service: demo-app
          annotations:
            summary: "Pod crash looping"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 5 minutes"
